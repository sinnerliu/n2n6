name: Build N2N_IPV6

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: ${{ matrix.TARGET }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows_static
            os: windows-latest
            ARCH: x64
            MSVC_ARCH: x64
          - target: x86_64-windows
            os: windows-latest
            ARCH: x64
            MSVC_ARCH: x64

          - target: i686-windows_static
            os: windows-latest
            ARCH: x86
            MSVC_ARCH: x86
          - target: i686-windows
            os: windows-latest
            ARCH: x86
            MSVC_ARCH: x86

          - target: aarch64-linux-musl_static
            os: ubuntu-latest
            URL: aarch64-linux-musl
          - target: aarch64-linux-musl
            os: ubuntu-latest
            URL: aarch64-linux-musl

          - target: x86_64-linux-musl_static
            os: ubuntu-latest
            URL: x86_64-linux-musl
          - target: x86_64-linux-musl
            os: ubuntu-latest
            URL: x86_64-linux-musl

          - target: i686-linux-musl_static
            os: ubuntu-latest
            URL: i686-linux-musl
          - target: i686-linux-musl
            os: ubuntu-latest
            URL: i686-linux-musl

          - target: armv7-linux-musleabihf_static
            os: ubuntu-latest
            URL: armv7l-linux-musleabihf
          - target: armv7-linux-musleabihf
            os: ubuntu-latest
            URL: armv7l-linux-musleabihf

          - target: armv7-linux-musleabi_static
            os: ubuntu-latest
            URL: armv7m-linux-musleabi
          - target: armv7-linux-musleabi
            os: ubuntu-latest
            URL: armv7m-linux-musleabi

          - target: arm-linux-musleabihf_static
            os: ubuntu-latest
            URL: arm-linux-musleabihf
          - target: arm-linux-musleabihf
            os: ubuntu-latest
            URL: arm-linux-musleabihf

          - target: arm-linux-musleabi_static
            os: ubuntu-latest
            URL: arm-linux-musleabi
          - target: arm-linux-musleabi
            os: ubuntu-latest
            URL: arm-linux-musleabi

          - target: mipsel-linux-musl_static
            os: ubuntu-latest
            URL: mipsel-linux-muslsf
          - target: mipsel-linux-musl
            os: ubuntu-latest
            URL: mipsel-linux-muslsf

          - target: mips-linux-musl_static
            os: ubuntu-latest
            URL: mips-linux-muslsf
          - target: mips-linux-musl
            os: ubuntu-latest
            URL: mips-linux-muslsf

          - target: x86_64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.TARGET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generate Platform Name
        shell: bash
        run: |
          ARCH_PART=$(echo "${{ matrix.TARGET }}" | cut -d'-' -f1)
          REST_PART=$(echo "${{ matrix.TARGET }}" | cut -d'-' -f2-)
          echo "PLATFORM_NAME=${REST_PART}-${ARCH_PART}" >> $GITHUB_ENV

      - name: Setup MSVC environment
        if: runner.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.MSVC_ARCH }}

      - name: Windows build (static)
        if: runner.os == 'windows' && endsWith(matrix.TARGET, '_static')
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          mkdir build
          cd build
          cmake .. `
            -G "NMake Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS_RELEASE="/MT /O2 /DWIN32 /D_WIN32_WINNT=0x0601" `
            -DCMAKE_EXE_LINKER_FLAGS="/SUBSYSTEM:CONSOLE,6.01 /MACHINE:${{ matrix.ARCH }}" `
            -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded"
          nmake
          .\edge.exe -h || true
          .\supernode.exe -h || true

      - name: Windows build (dynamic)
        if: runner.os == 'windows' && !endsWith(matrix.TARGET, '_static')
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          mkdir build
          cd build
          cmake .. `
            -G "NMake Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS_RELEASE="/MD /O2 /DWIN32 /D_WIN32_WINNT=0x0601" `
            -DCMAKE_EXE_LINKER_FLAGS="/SUBSYSTEM:CONSOLE,6.01 /MACHINE:${{ matrix.ARCH }}" `
            -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreadedDLL"
          nmake
          .\edge.exe -h || true
          .\supernode.exe -h || true

      - name: Set timezone
        if: runner.os == 'Linux'
        run: sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Download gcc
        if: runner.os == 'Linux'
        uses: lmq8267/dl-musl@main
        with:
          target: ${{ matrix.URL }}
          static: true
          gccpath: /opt/musl_gcc

      - name: Linux build
        if: runner.os == 'Linux'
        run: |
          LINKDIR="build"
          rm -rf "$LINKDIR"
          mkdir -p "$LINKDIR" && cd "$LINKDIR"
          EXTRA=""
          [ "${{ endsWith(matrix.TARGET, '_static') }}" = "true" ] && EXTRA="-static -static-libgcc"
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O2 -ffunction-sections -fdata-sections -fno-strict-aliasing" \
            -DCMAKE_EXE_LINKER_FLAGS="$EXTRA -Wl,--gc-sections" \
            -DCMAKE_C_COMPILER=${CC}
          make -j$(nproc)
          ./edge -h || true
          ls -la
          file edge
          $STRIP edge
          $STRIP supernode

      - name: macOS build
        if: runner.os == 'macOS'
        run: |
          rm -rf build
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O2 -ffunction-sections -fdata-sections" \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,-dead_strip"
          make -j$(sysctl -n hw.logicalcpu)
          ./edge -h || true
          ls -la
          file edge
          strip edge
          strip supernode

      - name: Upload Single Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: ${{ env.PLATFORM_NAME }}
          path: |
            build/edge${{ runner.os == 'Windows' && '.exe' || '' }}
            build/supernode${{ runner.os == 'Windows' && '.exe' || '' }}

  package:
    name: Package All Artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate Release Name
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')
          N2N_VER=$(grep -E 'set\(N2N_VERSION' CMakeLists.txt | cut -d' ' -f2 | tr -d ')')
          echo "RELEASE_NAME=n2n-v${N2N_VER}-${DATE}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_dir

      - name: Upload Unified Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_NAME }}
          path: release_dir/

      - name: Delete workflow
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 2
          keep_minimum_runs: 0
